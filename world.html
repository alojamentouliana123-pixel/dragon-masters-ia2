<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eldrakar</title>

  <link rel="stylesheet" href="./css/global-ui.css">
  <link rel="stylesheet" href="./css/prologue.css">
</head>

<body>

  <div id="cinematicLayer"></div>

  <div class="game-layout">

    <main class="story-container">
      <div id="storyText" class="story-text"></div>
    </main>

    <footer class="bottom-ui">

          id="playerInput"

        <button id="sendBtn">Perguntar 🔮</button>
      
    </footer>

  </div>


<script type="module" src="./js/prologue.js"></script>
<script type="module" src="./js/admin-test.js"></script>
